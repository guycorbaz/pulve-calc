# Vitesses au sol (km/h) par rapport au régime max, roues 14.9/13-30
vitesses_max = [
    1.302, 2.012, 2.543, 3.186, 3.982, 4.918,
    6.230, 7.847, 9.735, 12.115, 15.346, 23.978
]

[tracteur.pto]
